<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Estilos/styles.css">
    <title>Contactos</title>
</head>
<body>
    <header><a href="../Index.html">HOME</a>|CONTACTOS</header>
    <div class="contenedor">
        <form action="" method="post">
            <div class="etiqueta">
                <label for="nombre">Nombre: </label>
                <input id="nombre" name="nombre" type="text">
                <label for="email">E-mail: </label>
                <input id="email" name="email" type="email">
                <label for="telefono">Tel: </label>
                <input id="telefono" name="telefono" type="tel">
                <label class="mensaje" for="msj">Mensaje: </label>
                <textarea rows="10" cols="80" id="msj"></textarea>
            </div>
            <div class="boton">
                <button class="enviar" type="button">Enviar</button>
                <button class="cancelar" type="submit">Cancelar</button>
            </div>
        </form>
    </div>
    <br>
    <footer>Todos los derechos reservados</footer>

    
</body>
</html>
